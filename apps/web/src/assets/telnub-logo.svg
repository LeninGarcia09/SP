<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Interlocking loops icon -->
  <g transform="translate(10, 5) scale(0.9)">
    <!-- Top-left loop -->
    <ellipse cx="40" cy="35" rx="22" ry="22" stroke="#1a6db5" stroke-width="6" fill="none"/>
    <!-- Top-right loop -->
    <ellipse cx="65" cy="35" rx="22" ry="22" stroke="#0d4a80" stroke-width="6" fill="none"/>
    <!-- Bottom-left loop -->
    <ellipse cx="40" cy="60" rx="22" ry="22" stroke="#0d4a80" stroke-width="6" fill="none"/>
    <!-- Bottom-right loop -->
    <ellipse cx="65" cy="60" rx="22" ry="22" stroke="#17a2b8" stroke-width="6" fill="none"/>
  </g>
  <!-- TelNub text -->
  <text x="115" y="58" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#0d2b45">TelNub</text>
  <!-- Subtitle -->
  <text x="117" y="78" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#0d4a80" letter-spacing="2.5">AI &amp; SECURITY CONSULTING</text>
</svg>
