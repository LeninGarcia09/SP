# ─────────────────────────────────────────────────────────────
# BizOps Platform — Deploy Azure Infrastructure
# Manual trigger or on infrastructure file changes
# ─────────────────────────────────────────────────────────────
name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/bicep/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep template
        run: |
          az deployment group validate \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infrastructure/bicep/main.bicep \
            --parameters infrastructure/bicep/parameters/${{ env.ENVIRONMENT }}.bicepparam \
            --parameters dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD }}" jwtSecret="${{ secrets.JWT_SECRET }}"

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infrastructure/bicep/main.bicep \
            --parameters infrastructure/bicep/parameters/${{ env.ENVIRONMENT }}.bicepparam \
            --parameters dbAdminPassword="${{ secrets.DB_ADMIN_PASSWORD }}" jwtSecret="${{ secrets.JWT_SECRET }}" \
            --name "bizops-${{ env.ENVIRONMENT }}-$(date +%Y%m%d%H%M)"
